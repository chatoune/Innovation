openapi: 3.1.0
info:
  title: Client/Server Application Platform API
  description: REST API for user management, authentication, RBAC, and Excel import
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Users
    description: User account management
  - name: Roles
    description: Role and permission management
  - name: Modules
    description: Navigation module configuration
  - name: Import
    description: Excel file import operations
  - name: Audit
    description: Audit log access

paths:
  # ============================================
  # AUTHENTICATION
  # ============================================
  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTPOnly session cookie
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          description: Account locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: End current session
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user profile and permissions
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh authentication token
      operationId: refreshToken
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/webauthn/register/options:
    post:
      tags: [Authentication]
      summary: Get WebAuthn registration options
      operationId: getWebAuthnRegisterOptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registration options for navigator.credentials.create()
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebAuthnRegisterOptions'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/webauthn/register/verify:
    post:
      tags: [Authentication]
      summary: Complete WebAuthn credential registration
      operationId: verifyWebAuthnRegister
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebAuthnRegisterRequest'
      responses:
        '201':
          description: Credential registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FIDO2Credential'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/webauthn/login/options:
    post:
      tags: [Authentication]
      summary: Get WebAuthn login options
      operationId: getWebAuthnLoginOptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required: [email]
      responses:
        '200':
          description: Login options for navigator.credentials.get()
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebAuthnLoginOptions'
        '404':
          description: User not found or no credentials registered

  /auth/webauthn/login/verify:
    post:
      tags: [Authentication]
      summary: Complete WebAuthn authentication
      operationId: verifyWebAuthnLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebAuthnLoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================
  # USERS
  # ============================================
  /users:
    get:
      tags: [Users]
      summary: List all users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          schema:
            type: string
          description: Search by email
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active status
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Users]
      summary: Create a new user
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Email already exists

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'

    get:
      tags: [Users]
      summary: Get user by ID
      operationId: getUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/deactivate:
    post:
      tags: [Users]
      summary: Deactivate user account
      operationId: deactivateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/reactivate:
    post:
      tags: [Users]
      summary: Reactivate user account
      operationId: reactivateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User reactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/unlock:
    post:
      tags: [Users]
      summary: Unlock locked user account
      operationId: unlockUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/roles:
    get:
      tags: [Users]
      summary: Get user's assigned roles
      operationId: getUserRoles
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User's roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Users]
      summary: Set user's roles (replaces all existing)
      operationId: setUserRoles
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required: [role_ids]
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/credentials:
    get:
      tags: [Users]
      summary: List user's FIDO2 credentials
      operationId: getUserCredentials
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User's FIDO2 credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FIDO2Credential'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/credentials/{credentialId}:
    delete:
      tags: [Users]
      summary: Remove FIDO2 credential
      operationId: deleteUserCredential
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - name: credentialId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Credential removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/reset-fido2:
    post:
      tags: [Users]
      summary: Admin reset - remove all FIDO2 credentials
      operationId: resetUserFido2
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: All FIDO2 credentials removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================
  # ROLES
  # ============================================
  /roles:
    get:
      tags: [Roles]
      summary: List all roles
      operationId: listRoles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Roles]
      summary: Create a new role
      operationId: createRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Role name already exists

  /roles/{roleId}:
    parameters:
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Roles]
      summary: Get role by ID
      operationId: getRole
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role details with permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleWithPermissions'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Roles]
      summary: Update role
      operationId: updateRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Roles]
      summary: Delete role (cascades user assignments)
      operationId: deleteRole
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Role deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /roles/{roleId}/permissions:
    parameters:
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    put:
      tags: [Roles]
      summary: Set role permissions (replaces all existing)
      operationId: setRolePermissions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permission_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required: [permission_ids]
      responses:
        '200':
          description: Permissions updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleWithPermissions'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /permissions:
    get:
      tags: [Roles]
      summary: List all available permissions
      operationId: listPermissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Permission'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================
  # MODULES
  # ============================================
  /modules:
    get:
      tags: [Modules]
      summary: Get navigation modules for current user
      operationId: getModules
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Accessible modules for navigation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Module'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /modules/all:
    get:
      tags: [Modules]
      summary: List all modules (admin only)
      operationId: listAllModules
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleAdmin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Modules]
      summary: Create a new module
      operationId: createModule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModuleRequest'
      responses:
        '201':
          description: Module created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleAdmin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /modules/{moduleId}:
    parameters:
      - name: moduleId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    patch:
      tags: [Modules]
      summary: Update module
      operationId: updateModule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModuleRequest'
      responses:
        '200':
          description: Module updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleAdmin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Modules]
      summary: Delete module
      operationId: deleteModule
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Module deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================
  # EXCEL IMPORT
  # ============================================
  /import:
    post:
      tags: [Import]
      summary: Upload Excel file for import
      operationId: uploadImport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel file (.xlsx)
              required: [file]
      responses:
        '202':
          description: Import job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '400':
          description: Invalid file format
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /import/jobs:
    get:
      tags: [Import]
      summary: List import jobs for current user
      operationId: listImportJobs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Import job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /import/jobs/{jobId}:
    get:
      tags: [Import]
      summary: Get import job status
      operationId: getImportJob
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Import job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================
  # AUDIT LOG
  # ============================================
  /audit:
    get:
      tags: [Audit]
      summary: Query audit logs
      operationId: queryAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
      required: [error, message]

    # Authentication
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        expires_in:
          type: integer
          description: Token lifetime in seconds
        user:
          $ref: '#/components/schemas/CurrentUser'
      required: [access_token, token_type, expires_in, user]

    CurrentUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
          description: Effective permission codes
      required: [id, email, roles, permissions]

    WebAuthnRegisterOptions:
      type: object
      description: PublicKeyCredentialCreationOptions for navigator.credentials.create()

    WebAuthnRegisterRequest:
      type: object
      properties:
        credential:
          type: object
          description: AuthenticatorAttestationResponse from browser
        device_name:
          type: string
          maxLength: 100
      required: [credential]

    WebAuthnLoginOptions:
      type: object
      description: PublicKeyCredentialRequestOptions for navigator.credentials.get()

    WebAuthnLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        credential:
          type: object
          description: AuthenticatorAssertionResponse from browser
      required: [email, credential]

    FIDO2Credential:
      type: object
      properties:
        id:
          type: string
          format: uuid
        device_name:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
      required: [id, created_at]

    # Users
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        is_active:
          type: boolean
        is_locked:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
      required: [id, email, is_active, is_locked, created_at, updated_at]

    UserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [items, total, page, limit]

    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role_ids:
          type: array
          items:
            type: string
            format: uuid
      required: [email, password]

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    # Roles
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
      required: [id, name]

    RoleWithPermissions:
      allOf:
        - $ref: '#/components/schemas/Role'
        - type: object
          properties:
            permissions:
              type: array
              items:
                $ref: '#/components/schemas/Permission'
          required: [permissions]

    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        description:
          type: string
        resource:
          type: string
        action:
          type: string
      required: [id, code, description, resource, action]

    CreateRoleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
        permission_ids:
          type: array
          items:
            type: string
            format: uuid
      required: [name]

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string

    # Modules
    Module:
      type: object
      properties:
        code:
          type: string
        label:
          type: string
        route:
          type: string
        icon:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/Module'
      required: [code, label, route]

    ModuleAdmin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        label:
          type: string
        route:
          type: string
        icon:
          type: string
        sort_order:
          type: integer
        is_active:
          type: boolean
        parent_id:
          type: string
          format: uuid
        required_permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
      required: [id, code, label, route, sort_order, is_active]

    CreateModuleRequest:
      type: object
      properties:
        code:
          type: string
          maxLength: 50
        label:
          type: string
          maxLength: 100
        route:
          type: string
          maxLength: 255
        icon:
          type: string
          maxLength: 50
        sort_order:
          type: integer
        parent_id:
          type: string
          format: uuid
        permission_ids:
          type: array
          items:
            type: string
            format: uuid
      required: [code, label, route]

    UpdateModuleRequest:
      type: object
      properties:
        label:
          type: string
          maxLength: 100
        route:
          type: string
          maxLength: 255
        icon:
          type: string
          maxLength: 50
        sort_order:
          type: integer
        is_active:
          type: boolean
        parent_id:
          type: string
          format: uuid
        permission_ids:
          type: array
          items:
            type: string
            format: uuid

    # Import
    ImportJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed, completed_with_errors]
        total_rows:
          type: integer
        processed_rows:
          type: integer
        error_count:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              column:
                type: string
              message:
                type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required: [id, filename, status, created_at]

    ImportJobList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImportJob'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [items, total, page, limit]

    # Audit
    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        user_email:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        details:
          type: object
        ip_address:
          type: string
      required: [id, timestamp, action, resource_type]

    AuditLogList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [items, total, page, limit]
