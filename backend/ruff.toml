# Ruff configuration for backend
target-version = "py311"
line-length = 100

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
    "B904",   # raise without from inside except
]

[lint.per-file-ignores]
"tests/**/*.py" = ["ARG"]  # Allow unused arguments in tests
"alembic/**/*.py" = ["F401"]  # Allow unused imports in migrations
"src/api/routes/**/*.py" = ["ARG001"]  # FastAPI routes require specific signatures
"src/api/middleware/**/*.py" = ["ARG001"]  # Exception handlers require specific signatures
"src/main.py" = ["ARG001"]  # FastAPI lifespan requires app parameter

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
